baseURL = "https://example.com/"
languageCode = "en-us"
title = "ThinLine Reviews"
enableRobotsTXT = true

[pagination]
  pagerSize = 15

[params]
  description = "Clean and focused anime reviews"
  author = "ThinLine Reviews Team"

[outputs]
  home = ["HTML", "RSS"]

[sitemap]
  changefreq = "daily"
  priority = 0.8

[markup.goldmark.renderer]
  unsafe = true
